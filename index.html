                      <div className="md:col-span-5 space-y-6">
                        <div className={`p-6 rounded-2xl border ${theme === 'dark' ? 'bg-slate-900/60 border-slate-800' : 'bg-white border-slate-200'} space-y-4`}>
                          <h3 className="text-sm font-bold border-b pb-2">🛡️ Güvenlik</h3>
                          <label className="flex items-center justify-between cursor-pointer text-xs"><span className="text-slate-500">Profilimi Sadece Eşleşenlere Göster</span><input type="checkbox" checked={privateProfile} onChange={(e) => setPrivateProfile(e.target.checked)} className="text-pink-600" /></label>
                        </div>
                        <button onClick={handleRunAnalysis} disabled={isAnalyzing} className="w-full bg-pink-600 hover:bg-pink-500 text-white font-bold py-3.5 rounded-xl shadow-md text-xs uppercase tracking-wider transition-all flex items-center justify-center space-x-2">
                          {isAnalyzing ? "Analiz Ediliyor..." : "SİS-AI İle Eşleşmeleri Bul & Rotaları Gör"}
                        </button>
                      </div>
                    </div>
                  </div>
                )}

                {/* 3. EŞLEŞMELER TAB */}
                {activeTab === 'eslesme' && (
                  <div className="space-y-8 animate-fadeIn">
                    {analysisRan ? (
                      <div className="space-y-8">
                        <div className={`p-6 rounded-2xl border ${theme === 'dark' ? 'bg-slate-900/40 border-indigo-950' : 'bg-indigo-50/50 border-indigo-200'} relative overflow-hidden`}>
                          <h3 className="text-base font-bold mb-2 text-indigo-500">✨ Sayın {studentName}, Akademik Rotanız</h3>
                          <p className="text-xs sm:text-sm leading-relaxed mb-4">{matchedRoadmap}</p>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                          {matchedMentors.map(mentor => (
                            <div key={mentor.id} className={`p-5 rounded-2xl border flex flex-col justify-between ${theme === 'dark' ? 'bg-slate-900/40 border-slate-800' : 'bg-white border-slate-200'}`}>
                              <div>
                                <div className="flex items-center justify-between mb-2"><span className="text-2xl">{mentor.avatar}</span><span className="text-[9px] font-bold bg-purple-100 text-purple-700 px-2 py-0.5 rounded">{mentor.role}</span></div>
                                <h4 className="text-sm font-bold">{mentor.name}</h4>
                                <span className="text-[10px] text-pink-500 font-semibold block">{mentor.institution}</span>
                                <p className="text-xs text-slate-500 my-2 line-clamp-3">{mentor.bio}</p>
                                <div className="my-2 text-[10px] bg-pink-500/5 p-2 rounded border border-pink-500/10 truncate">📬 {mentor.email}</div>
                              </div>
                              <div className="grid grid-cols-2 gap-2 mt-4 pt-2 border-t border-slate-100 dark:border-slate-800">
                                <button onClick={() => setEmailModalUser(mentor)} className="text-[10px] font-bold border border-pink-500/20 text-pink-500 rounded-lg py-2">✉ E-posta</button>
                                <button onClick={() => startChat(mentor)} className="text-[10px] font-bold bg-pink-600 text-white rounded-lg py-2">Sohbet</button>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    ) : (
                      <div className="text-center py-12"><p className="text-slate-500 mb-4">Lütfen önce SİS Profilim sekmesinden analiz motorunu çalıştırın.</p><button onClick={() => setActiveTab('simulator')} className="bg-pink-600 text-white text-xs px-4 py-2 rounded-lg">Profil Sayfasına Git</button></div>
                    )}
                  </div>
                )}

                {/* 4. RADAR TAB */}
                {activeTab === 'radar' && (
                  <div className="space-y-8 animate-fadeIn">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      {filteredRadarOpportunities.map(opp => (
                        <div key={opp.id} className={`p-6 rounded-2xl border flex flex-col justify-between ${theme === 'dark' ? 'bg-slate-900/40 border-slate-800' : 'bg-white border-slate-200'}`}>
                          <div>
                            <span className="text-[9px] bg-pink-100 text-pink-700 px-2.5 py-1 rounded font-bold">{opp.category}</span>
                            <h3 className="text-base font-bold my-2">{opp.title}</h3>
                            <p className="text-xs text-slate-500 line-clamp-3 leading-relaxed">{opp.desc}</p>
                          </div>
                          <div className="pt-4 border-t border-slate-100 dark:border-slate-800 mt-4 flex items-center justify-between">
                            <div><span className="text-[9px] text-slate-400 block">Son Başvuru</span><strong className="text-xs text-rose-500">{opp.deadline}</strong></div>
                            <button onClick={() => { setSelectedOpportunityModal(opp); completeTask("task_view_radar", 20); }} className="bg-pink-600 text-white text-xs px-4 py-2 rounded-lg font-semibold">Detayları Gör</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* 5. TAKIM TAB */}
                {activeTab === 'takim' && (
                  <div className="space-y-8 animate-fadeIn">
                    <form onSubmit={handlePublishTeam} className={`p-6 rounded-2xl border ${theme === 'dark' ? 'bg-slate-900/40 border-slate-800' : 'bg-white border-slate-200'} max-w-2xl mx-auto space-y-4`}>
                      <h3 className="text-sm font-bold">Takım Arkadaşı İlanı Paylaş</h3>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 text-xs">
                        <input type="text" value={newProjName} onChange={(e) => setNewProjName(e.target.value)} placeholder="Proje Adı" className={`border rounded-lg p-2 ${theme === 'dark' ? 'bg-slate-950 border-slate-800 text-slate-200' : 'bg-white'}`} />
                        <input type="text" value={newProjContest} onChange={(e) => setNewProjContest(e.target.value)} placeholder="Hedef Yarışma" className={`border rounded-lg p-2 ${theme === 'dark' ? 'bg-slate-950 border-slate-800 text-slate-200' : 'bg-white'}`} />
                      </div>
                      <input type="text" value={newProjRoles} onChange={(e) => setNewProjRoles(e.target.value)} placeholder="Aranan Roller (virgülle ayırın)" className={`w-full border rounded-lg p-2 text-xs ${theme === 'dark' ? 'bg-slate-950 border-slate-800 text-slate-200' : 'bg-white'}`} />
                      <textarea value={newProjDesc} onChange={(e) => setNewProjDesc(e.target.value)} placeholder="Proje Kısa Açıklaması..." rows="2" className={`w-full border rounded-lg p-2 text-xs ${theme === 'dark' ? 'bg-slate-950 border-slate-800 text-slate-200' : 'bg-white'}`}></textarea>
                      {teamFormError && <p className="text-xs text-rose-500">{teamFormError}</p>}
                      {teamFormSuccess && <p className="text-xs text-emerald-500">🎉 İlan başarıyla panoya eklendi!</p>}
                      <button type="submit" className="bg-pink-600 text-white text-xs font-bold px-4 py-2 rounded-lg float-right">Yayınla</button>
                      <div className="clear-both"></div>
                    </form>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                      {takimlar.map(team => (
                        <div key={team.id} className={`p-5 rounded-2xl border flex flex-col justify-between ${theme === 'dark' ? 'bg-slate-900/40 border-slate-800' : 'bg-white border-slate-200'}`}>
                          <div>
                            <span className="text-[9px] bg-pink-100 text-pink-700 font-bold px-2 py-0.5 rounded">{team.contest}</span>
                            <h4 className="text-sm font-bold my-1">{team.projectName}</h4>
                            <p className="text-xs text-slate-500 line-clamp-2">{team.description}</p>
                          </div>
                          <button onClick={() => setSelectedTeam(team)} className="mt-4 text-xs font-bold w-full py-2 bg-slate-100 dark:bg-slate-900 rounded-lg text-center">İncele & Başvur</button>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* 6. SOHBET TAB */}
                {activeTab === 'sohbet' && (
                  <div className="max-w-3xl mx-auto animate-fadeIn">
                    {chatPartner ? (
                      <div className={`rounded-2xl border flex flex-col h-[480px] overflow-hidden ${theme === 'dark' ? 'bg-slate-900/60 border-slate-800' : 'bg-white border-slate-200'}`}>
                        <div className="p-4 border-b flex items-center justify-between bg-slate-50 dark:bg-slate-950">
                          <h4 className="text-sm font-bold">{chatPartner.name} ile Sohbet Odası</h4>
                        </div>
                        <div className="flex-1 p-4 overflow-y-auto space-y-3">
                          {messages.map((msg, idx) => (
                            <div key={idx} className={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                              <div className={`p-3 rounded-xl text-xs max-w-md ${msg.sender === 'user' ? 'bg-pink-600 text-white' : 'bg-slate-100 dark:bg-slate-800'}`}>{msg.text}</div>
                            </div>
                          ))}
                          {chatWarning && <div className="p-2 bg-rose-500/10 text-rose-500 text-xs rounded">{chatWarning}</div>}
                        </div>
                        <form onSubmit={handleSendMessage} className="p-4 border-t flex space-x-2">
                          <input type="text" value={currentMessage} onChange={(e) => setCurrentMessage(e.target.value)} placeholder="Akademik sorunuzu yazın..." className="flex-1 border rounded-lg p-2 text-xs bg-transparent" />
                          <button type="submit" className="bg-pink-600 text-white text-xs px-4 py-2 rounded-lg">Gönder</button>
                        </form>
                      </div>
                    ) : (
                      <div className="text-center py-12 text-slate-400">Sohbet odası boş. Lütfen Eşleşmeler alanından bir mentör seçin.</div>
                    )}
                  </div>
                )}

                {/* 7. ETKİ TAB */}
                {activeTab === 'etki' && (
                  <div className="grid grid-cols-1 md:grid-cols-12 gap-8 animate-fadeIn">
                    <div className={`md:col-span-4 p-6 rounded-2xl border text-center ${theme === 'dark' ? 'bg-slate-900/60 border-slate-800' : 'bg-white border-slate-200'}`}>
                      <span className="text-xs uppercase tracking-wider font-bold text-pink-500">Etki Skorunuz</span>
                      <div className="text-4xl font-black text-pink-600 my-2">{userPoints} Puan</div>
                      <p className="text-xs text-slate-500">Mevcut Durum: Akademik SİS Yolcusu</p>
                    </div>
                    <div className={`md:col-span-8 p-6 rounded-2xl border ${theme === 'dark' ? 'bg-slate-900/60 border-slate-800' : 'bg-white border-slate-200'} space-y-3`}>
                      <h3 className="text-sm font-bold">Liderlik ve Katkı Sıralaması</h3>
                      {MOCK_TOPLULUK.sort((a,b)=> b.impactScore - a.impactScore).slice(0,4).map((user, i)=>(
                        <div key={user.id} className="flex justify-between items-center text-xs p-2 border-b dark:border-slate-800">
                          <span>{i+1}. {user.avatar} {user.name}</span>
                          <strong className="text-pink-500">{user.impactScore} Puan</strong>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

              </main>

              {/* MODALLAR */}
              {emailModalUser && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-xs">
                  <div className={`w-full max-w-md rounded-xl p-6 ${theme === 'dark' ? 'bg-slate-900 text-white' : 'bg-white text-slate-800'}`}>
                    <h3 className="text-sm font-bold mb-4">📧 Akademik İletişim Bilgisi</h3>
                    <p className="text-xs mb-2"><strong>{emailModalUser.name}</strong> adlı kullanıcının doğrulanmış mail adresi:</p>
                    <div className="p-3 bg-slate-100 dark:bg-slate-950 rounded font-mono text-xs text-center select-all text-pink-500 tracking-wide mb-4">{emailModalUser.email}</div>
                    <div className="flex space-x-2 justify-end">
                      <button onClick={() => { copyToClipboard(emailModalUser.email); }} className="bg-pink-600 text-white text-xs px-3 py-1.5 rounded">{copyStatus ? 'Kopyalandı!' : 'Kopyala'}</button>
                      <button onClick={() => setEmailModalUser(null)} className="border text-xs px-3 py-1.5 rounded">Kapat</button>
                    </div>
                  </div>
                </div>
              )}

              {selectedOpportunityModal && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-xs">
                  <div className={`w-full max-w-xl rounded-xl p-6 max-h-[85vh] overflow-y-auto ${theme === 'dark' ? 'bg-slate-900 text-white' : 'bg-white text-slate-800'}`}>
                    <h3 className="text-base font-bold text-pink-500">{selectedOpportunityModal.title}</h3>
                    <p className="text-xs my-3 text-slate-400 leading-relaxed">{selectedOpportunityModal.desc}</p>
                    <div className="space-y-2 text-xs bg-slate-50 dark:bg-slate-950 p-3 rounded-lg">
                      <p><strong>Başvuru Şartları:</strong> {selectedOpportunityModal.conditions}</p>
                      <p><strong>Gerekli Belgeler:</strong> {selectedOpportunityModal.documents}</p>
                      <p><strong>Ödüller / Kazanımlar:</strong> {selectedOpportunityModal.awards}</p>
                    </div>
                    <div className="mt-4 flex justify-end space-x-2">
                      <a href={selectedOpportunityModal.link} target="_blank" rel="noreferrer" className="bg-pink-600 text-white text-xs px-4 py-2 rounded-lg">Resmi Sayfa ↗</a>
                      <button onClick={() => setSelectedOpportunityModal(null)} className="border text-xs px-4 py-2 rounded-lg">Kapat</button>
                    </div>
                  </div>
                </div>
              )}

              {selectedTeam && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-xs">
                  <div className={`w-full max-w-md rounded-xl p-6 ${theme === 'dark' ? 'bg-slate-900 text-white' : 'bg-white'}`}>
                    <h3 className="text-base font-bold text-pink-500">{selectedTeam.projectName}</h3>
                    <p className="text-xs my-2 text-slate-400">Hedef: {selectedTeam.contest}</p>
                    <p className="text-xs leading-relaxed my-3">{selectedTeam.description}</p>
                    <div className="text-xs bg-slate-50 dark:bg-slate-950 p-3 rounded mb-4"><strong>Detaylar:</strong> {selectedTeam.details}</div>
                    {justAppliedSuccess && <p className="text-xs text-emerald-500 font-bold mb-2">✓ Başvuru talebi kurucuya iletildi!</p>}
                    <div className="flex justify-end space-x-2">
                      <button onClick={() => handleApplyToTeamAction(selectedTeam.id)} disabled={appliedTeamIds.includes(selectedTeam.id)} className="bg-pink-600 text-white text-xs px-4 py-2 rounded-lg">{appliedTeamIds.includes(selectedTeam.id) ? "Başvuruldu" : "Takıma Katılma İsteği Gönder"}</button>
                      <button onClick={() => { setSelectedTeam(null); setJustAppliedSuccess(false); }} className="border text-xs px-4 py-2 rounded-lg">Kapat</button>
                    </div>
                  </div>
                </div>
              )}

              {/* FOOTER */}
              <footer className={`border-t mt-16 py-6 text-center text-xs ${theme === 'dark' ? 'bg-slate-950 border-slate-800 text-slate-500' : 'bg-white border-slate-200 text-slate-400'}`}>
                <p className="font-bold text-slate-400">SistersInScience (SİS) Portal</p>
                <p className="mt-1">© 2026 SİS Topluluğu • Samsung Solve for Tomorrow Sürdürülebilirlik Girişimi</p>
              </footer>

            </div>
          );
        }

        // Uygulamayı DOM ağacına yerleştiriyoruz
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
